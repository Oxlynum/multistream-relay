name: Build & Push Relay Image

on:
  push:
    branches: [main]
    paths:
      - 'relay/**'
      - '.github/workflows/relay-docker.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/oxlynum/multistream-relay

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: relay
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin Vercel to new image SHA
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel env rm SLIMCAST_RELAY_IMAGE production --yes --token=$VERCEL_TOKEN 2>/dev/null || true
          echo "${{ env.IMAGE }}:${{ github.sha }}" | npx vercel env add SLIMCAST_RELAY_IMAGE production --token=$VERCEL_TOKEN
          npx vercel --prod --token=$VERCEL_TOKEN --yes
