name: Release

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14   # GitHub's Apple-Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja

      - name: Install OBS Studio
        run: |
          OBS_VERSION="32.1.2"
          PKG_URL="https://github.com/obsproject/obs-studio/releases/download/${OBS_VERSION}/obs-studio-${OBS_VERSION}-macos-apple.pkg"
          curl -L -o /tmp/obs.pkg "$PKG_URL"
          sudo installer -pkg /tmp/obs.pkg -target /

      - name: Configure (downloads obs-deps Qt automatically)
        run: cmake --preset macos-arm64

      - name: Build
        run: cmake --build --preset macos-arm64

      - name: Install into staging
        run: |
          cmake --install build/macos-arm64 \
            --prefix "${{ github.workspace }}/staging"

      - name: Package .pkg
        run: bash installers/macos/build-installer.sh
        env:
          STAGING_DIR: "${{ github.workspace }}/staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slimcast-obs-macOS
          path: "*.pkg"
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OBS Studio
        shell: pwsh
        run: |
          $OBS_VERSION = "32.1.2"
          $url = "https://github.com/obsproject/obs-studio/releases/download/$OBS_VERSION/OBS-Studio-$OBS_VERSION-Windows.exe"
          Invoke-WebRequest -Uri $url -OutFile obs-installer.exe
          Start-Process -Wait -FilePath .\obs-installer.exe -ArgumentList "/S"

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Configure (downloads obs-deps Qt automatically)
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build --preset windows-x64

      - name: Stage + package
        shell: cmd
        run: |
          cmake --install build\windows-x64 --config RelWithDebInfo ^
                --prefix installers\windows\staging
          "%PROGRAMFILES(X86)%\NSIS\makensis.exe" installers\windows\installer.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slimcast-obs-Windows
          path: "*.exe"
          if-no-files-found: error

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  release:
    name: Attach to GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.pkg
            dist/**/*.exe
          generate_release_notes: true
