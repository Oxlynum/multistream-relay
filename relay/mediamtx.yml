# MediaMTX ingest config for the multistream relay.
# Receives enhanced-RTMP HEVC from OBS over TCP and republishes it on a
# loopback RTSP URL that the encoder processes pull from.

logLevel: info
logDestinations: [stdout]

# --- RTMP ingest (OBS -> pod, over RunPod's exposed TCP port) --------------
rtmp: yes
rtmpAddress: :1935
# enhanced-RTMP (H.265/HEVC, AV1) is accepted automatically by current builds.

# --- SRT republish (loopback, consumed by FFmpeg) -------------------------
# The encoders pull the feed over SRT (MPEG-TS), NOT RTSP: RTSP/RTP mangles
# Apple's temporal-layered HEVC and causes dropped frames / artifacts. SRT
# carries HEVC cleanly. Loopback SRT is lossless. Keep 8890 OUT of RunPod's
# exposed ports so it stays internal.
srt: yes
srtAddress: :8890

# Still expose RTSP locally as a fallback source if ever needed.
rtsp: yes
rtspAddress: :8554

# HLS preview on :8888. Used by the dashboard to verify OBS→pod ingest.
# Only the ingest-key path is published, so the URL is effectively secret.
hls: yes
hlsAddress: :8888
hlsAllowOrigin: '*'
hlsAlwaysRemux: no   # only serve HLS when a publisher is active

webrtc: no

paths:
  # OBS publishes to rtmp://<pod>:<mapped-port>/<ingest-key>. The path is a
  # per-pod secret (the agent substitutes __INGEST_PATH__ from SLIMCAST_INGEST_KEY
  # at boot), so only OBS holding the key can publish. Defaults to "live" locally.
  __INGEST_PATH__:
    source: publisher

    # Auto start/stop the transcoder with OBS:
    #   runOnReady    fires when OBS starts publishing  -> turn relay ON
    #   runOnNotReady fires when OBS stops publishing    -> turn relay OFF
    # hook.sh must be executable and in this folder (start.sh chmods it).
    runOnReady: bash hook.sh start
    runOnReadyRestart: no
    runOnNotReady: bash hook.sh stop
