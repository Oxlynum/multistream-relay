# MediaMTX ingest config for the multistream relay.
# Receives HEVC from OBS over SRT (UDP) on :8890 and serves the same feed back over
# an SRT loopback that the encoder processes pull from. RTMP :1935 is kept ONLY as a
# readiness beacon for the broker's probe — OBS no longer publishes to it.

logLevel: info
logDestinations: [stdout]

# --- RTMP readiness beacon (:1935/tcp) ------------------------------------
# NOT the OBS ingest anymore — OBS publishes over SRT (below). MediaMTX still binds
# RTMP so the broker's TCP RTMP-handshake probe can confirm MediaMTX is serving
# (a UDP round-trip can't be confirmed reliably from a serverless prober). The port
# is host-mapped; nothing publishes to it under normal operation.
rtmp: yes
rtmpAddress: :1935

# --- SRT ingest + loopback (:8890/udp) ------------------------------------
# One SRT server, double duty: OBS PUBLISHES here from outside
# (streamid=publish:<key>, via the host-mapped UDP port) AND the encoders READ the
# same path back over the loopback (streamid=read:<key>). SRT, NOT RTSP: RTSP/RTP
# mangles Apple's temporal-layered HEVC → dropped frames / artifacts; SRT carries
# HEVC cleanly. 8890/udp MUST be host-exposed now — it is the OBS ingest, not just
# an internal loopback.
srt: yes
srtAddress: :8890

# RTSP server is disabled — nothing uses it. The OBS ingest and the encoder loopback
# are both SRT (above), HLS preview is served from the publisher directly, and the
# RTMP beacon is TCP. (RTSP/RTP also mangles Apple's temporal-layered HEVC, so it was
# never a viable path here anyway.)
rtsp: no

# HLS preview on :8888. Used by the dashboard to verify OBS→pod ingest.
# Only the ingest-key path is published, so the URL is effectively secret.
hls: yes
hlsAddress: :8888
hlsAllowOrigins: ["*"]
hlsAlwaysRemux: no   # only serve HLS when a publisher is active
# fmp4 avoids Low-Latency HLS session tokens (LLHLS is the v1.19 default).
# LLHLS requires a session cookie for sub-playlists; our stateless Vercel
# proxy doesn't forward it, causing 401s on video1_stream.m3u8/audio2_stream.m3u8.
hlsVariant: fmp4

webrtc: no

paths:
  # OBS publishes to srt://<pod>:<mapped-udp-port>?streamid=publish:<ingest-key>.
  # The path is a per-pod secret (the agent substitutes __INGEST_PATH__ from
  # SLIMCAST_INGEST_KEY at boot), so only OBS holding the key can publish. The
  # runOnReady hook below fires on this publish regardless of protocol — it's a
  # path-ready event — which is what drives the whole start-streaming chain
  # (hook.sh → /tmp/obs_connected → agent starts encoders → heartbeat streaming=true).
  # Defaults to "live" locally.
  __INGEST_PATH___preview:
    # supervisor.py's "preview" runner reads the SRT loopback, transcodes HEVC→H.264
    # (browsers cannot decode HEVC in HLS.js), and pushes the result here via RTMP.
    # MediaMTX then serves it as HLS on :8888 so the dashboard preview player works.
    source: publisher

  __INGEST_PATH__:
    source: publisher

    # SRT AES encryption (per-pod passphrase, substituted by agent.py from
    # SLIMCAST_SRT_PASSPHRASE). With these set, MediaMTX requires the passphrase to
    # BOTH publish (OBS uplink) and read (encoder loopback), so the HEVC feed is
    # encrypted in flight over the public internet — not just gated by the secret
    # streamid. agent.py strips these two lines when no passphrase is set (local/dev).
    srtReadPassphrase: __SRT_PASSPHRASE__
    srtPublishPassphrase: __SRT_PASSPHRASE__

    # Auto start/stop the transcoder with OBS:
    #   runOnReady    fires when OBS starts publishing  -> turn relay ON
    #   runOnNotReady fires when OBS stops publishing    -> turn relay OFF
    # hook.sh must be executable and in this folder (start.sh chmods it).
    runOnReady: bash hook.sh start
    runOnReadyRestart: no
    runOnNotReady: bash hook.sh stop
